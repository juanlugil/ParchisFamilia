<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parchís Familiar</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="welcome-panel" id="welcomePanel">
      <div class="welcome-content">
        <!-- 🍿 Envoltura de marquesina con efecto blur -->
        <div class="welcome-marquee">
          <h1>Vamos a echar una partida al PARCHÍS</h1>
        </div>
        <div class="welcome-actions">
          <button id="closeButton" type="button" class="secondary">CERRAR</button>
          <button id="continueButton" type="button" class="primary">CONTINUAR</button>
        </div>
      </div>
    </section>

    <section class="selection-panel hidden" id="selectionPanel">
      <div class="selection-marquee">
      <h2>ESCOGE UNA IMAGEN PARA CADA JUGADOR</h2>
      
      <div class="inputs-grid">
        <label class="file-label" for="imageRed">Jugador<div class="text-color-red">Rojo</div></label>
        <input id="imageRed" type="file" accept="image/*" />
        <label class="file-label" for="imageGreen">Jugador<div class="text-color-green">Verde</div></label>
        <input id="imageGreen" type="file" accept="image/*" />
        <label class="file-label" for="imageYellow">Jugador<div class="text-color-yellow">Amarillo</div></label>
        <input id="imageYellow" type="file" accept="image/*" />
        <label class="file-label" for="imageBlue">Jugador<div class="text-color-blue">Azul</div></label>
        <input id="imageBlue" type="file" accept="image/*" />
      
      </div>
      <div class="dice-duration-setting" style="margin-top: 24px; text-align: center; width: 100%; max-width: 400px; margin-left: auto; margin-right: auto;">
        <label for="diceDurationSlider" style="display: block; font-weight: bold; margin-bottom: 12px;">
          Tiempo de tirada de dado: <span id="diceDurationValue">3</span>s
        </label>
        <div style="display: flex; align-items: center; justify-content: space-between; gap: 10px;font-weight: bold;">
          <span>1</span>
          <input 
            type="range" 
            id="diceDurationSlider" 
            min="1" 
            max="5" 
            step="1" 
            value="3" 
            style="flex-grow: 1; cursor: pointer;"
          >
          <span>5</span>
          </div>
        </div>
      </div>
    </div>
      <div class="selection-actions">
        <button id="backButton" type="button" class="secondary">VOLVER</button>
        <button id="startButton" type="button" class="primary">INICIAR PARTIDA</button>
      </div>
      <div id="selectionStatus" class="status-panel hidden"></div>
    </section>

    <section class="board-panel hidden" id="boardPanel">
      <div class="board-screen">
        <div id="statusPanel" class="status-panel"></div>
        <div class="board-stage" id="boardStage" aria-label="Tablero de parchís"></div>
      </div>
      <div class="dice-overlay hidden" id="diceOverlay">
        <div class="dice-dialog">
          <div class="dice-controls">
            <button id="rollDiceButton" type="button">LANZAR DADO</button>
            <div id="diceFace" class="dice-face hidden" aria-label="Cara del dado"></div>
          </div>
          <div id="diceResult" class="dice-result hidden"></div>
          <div id="diceOptionGroup" class="action-button-group"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
